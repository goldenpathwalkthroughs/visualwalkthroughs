name: Nightly Pipeline

on:
  # ── NIGHTLY SCHEDULE PAUSED ────────────────────────────────────────────────
  # Autonomous authoring (scripts/author.js) isn't reliable yet: the drafting
  # step can't parse the research fact sheet into sections (research is capped at
  # 4096 tokens and the `--- Section N ---` markers get truncated), so every real
  # build fails. The model-404 fix unblocked research but exposed this deeper bug.
  # Re-enable the schedule once author.js is fixed. Manual runs still work below.
  #   schedule:
  #     - cron: '0 2 * * *'   # 02:00 UTC = 03:00 UK (BST)
  workflow_dispatch:        # manual trigger from the GitHub Actions tab
    inputs:
      game:
        description: 'Game title — overrides content/queue.json (leave blank to build the next queued item)'
        required: false
      franchise:
        description: 'Franchise slug (e.g. zelda)'
        required: false
      slug:
        description: 'Game slug (e.g. ocarina-of-time)'
        required: false
      year:
        description: 'Release year'
        required: false
      platforms:
        description: 'Platforms, comma-separated (e.g. N64, GameCube)'
        required: false

permissions:
  contents: write   # needed so the pipeline can push game files and reports

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # matches pipeline.config.json → timeCapMinutes

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          # Use default GITHUB_TOKEN — has contents:write on this repo
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so git tag + rollback always have a target
          fetch-depth: 0

      # ── 2. Node setup ─────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install deps ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 3b. Claude Code CLI ───────────────────────────────────────────────────
      # The pipeline authors via `claude -p` (scripts/lib/claude-cli.js) so it
      # bills the owner's Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN), not API
      # credits. The CLI must be on PATH.
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # ── 4. Playwright browsers ────────────────────────────────────────────────
      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium --with-deps

      # ── 5. Configure git for pipeline commits ────────────────────────────────
      - name: Configure git
        run: |
          git config user.name  "VisualWalkthroughs Bot"
          git config user.email "bot@visualwalkthroughs.pages.dev"

      # ── 6. Run the pipeline ───────────────────────────────────────────────────
      - name: Run nightly pipeline
        env:
          # Subscription auth for `claude -p` (NOT ANTHROPIC_API_KEY — that would
          # bill credits and takes precedence if both are set, so it's omitted).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLOUDFLARE_API_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Dispatch inputs are passed as ENV VARS, never interpolated into the
          # script body — this is the documented defence against workflow script
          # injection (a malicious input value can't break out of an env value).
          IN_GAME:      ${{ inputs.game }}
          IN_FRANCHISE: ${{ inputs.franchise }}
          IN_SLUG:      ${{ inputs.slug }}
          IN_YEAR:      ${{ inputs.year }}
          IN_PLATFORMS: ${{ inputs.platforms }}
        run: |
          # Build an argv array from the env vars (no eval, proper quoting) so
          # the input values reach node as discrete arguments.
          args=()
          if [ -n "$IN_GAME" ]; then
            args+=(--game "$IN_GAME" --franchise "$IN_FRANCHISE" --slug "$IN_SLUG")
            [ -n "$IN_YEAR" ]      && args+=(--year "$IN_YEAR")
            [ -n "$IN_PLATFORMS" ] && args+=(--platforms "$IN_PLATFORMS")
          fi
          node scripts/pipeline.js "${args[@]}"

      # ── 7. Commit the nightly report (always, even on failure) ───────────────
      - name: Commit nightly report
        if: always()
        run: |
          # --autostash: tuck away any partial working-tree changes a failed
          # authoring run left behind, so the rebase doesn't abort with
          # "cannot pull with rebase: you have unstaged changes".
          git pull --rebase --autostash origin main

          git add reports/
          # Only commit if the report file is new or changed
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: nightly report $(date +%Y-%m-%d)"
            git push
          fi
